<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MvcMovie - Home</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- App CSS -->
  <link href="/css/cinema.css" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="#">MvcMovie</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapse" aria-controls="navCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navCollapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Privacy</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <header class="text-center mb-4">
      <h1 class="display-5">MvcMovie</h1>
      <p class="text-muted">A minimal Spring Boot MVC demo — posters, trailers, and accessible placeholders.</p>
    </header>

    <section>
      <nav>
        <div class="nav nav-tabs justify-content-center" id="cinema-tabs" role="tablist">
          <button class="nav-link active" id="board-1-tab" data-bs-toggle="tab" data-bs-target="#board-1" type="button" role="tab" aria-controls="board-1" aria-selected="true">Board 1</button>
          <button class="nav-link" id="board-2-tab" data-bs-toggle="tab" data-bs-target="#board-2" type="button" role="tab" aria-controls="board-2" aria-selected="false">Board 2</button>
          <button class="nav-link" id="board-3-tab" data-bs-toggle="tab" data-bs-target="#board-3" type="button" role="tab" aria-controls="board-3" aria-selected="false">Board 3</button>
        </div>
      </nav>

      <div class="tab-content mt-4" id="cinema-tabs-content">
        <!-- Board 1: posters grid -->
        <div class="tab-pane fade show active" id="board-1" role="tabpanel" aria-labelledby="board-1-tab">
          <div class="row gy-4">
            <!-- iterate mediaList provided by controller -->
            <div th:each="m : ${mediaList}" class="col-12 col-md-6">
              <div class="cinema-card position-relative">
                <!-- show image when posterUrl present -->
                <div th:if="${m.posterUrl != null and m.posterUrl != ''}">
                  <img th:src="@{${m.posterUrl}}"
                       th:alt="${m.altText}"
                       class="cinema-poster"
                       loading="lazy"/>
                </div>

                <!-- text placeholder when no posterUrl -->
                <div th:unless="${m.posterUrl != null and m.posterUrl != ''}" class="cinema-poster placeholder-box">
                  <div class="text-center">
                    <strong th:text="${m.title}">Poster</strong>
                    <div class="small text-muted">Image placeholder</div>
                  </div>
                </div>

                <!-- play button: disabled if no videoUrl -->
                <button type="button"
                        class="play-overlay btn btn-light btn-lg rounded-circle"
                        data-bs-toggle="modal"
                        data-bs-target="#trailerModal"
                        th:attr="data-video-src=${m.videoUrl}"
                        th:classappend="${m.videoUrl == null || m.videoUrl == ''} ? ' disabled' : ''"
                        th:attrappend="aria-label=|Play trailer for ${m.title}|">
                  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M11.596 8.697l-6.363 3.692A.5.5 0 0 1 4 12.999V3.001a.5.5 0 0 1 .733-.441l6.363 3.692a.5.5 0 0 1 0 .882z"/>
                  </svg>
                </button>

                <div class="cinema-caption">
                  <h5 class="mb-0" th:text="${m.title}">Title</h5>
                </div>
              </div>
            </div>
            <!-- end th:each -->
          </div>
        </div>

        <!-- Board 2 -->
        <div class="tab-pane fade" id="board-2" role="tabpanel" aria-labelledby="board-2-tab">
          <div class="p-4 text-center text-muted">Board 2 content placeholder.</div>
        </div>

        <!-- Board 3 -->
        <div class="tab-pane fade" id="board-3" role="tabpanel" aria-labelledby="board-3-tab">
          <div class="p-4 text-center text-muted">Board 3 content placeholder.</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Trailer Modal -->
  <div class="modal fade" id="trailerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content bg-dark">
        <div class="modal-header border-0">
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0">
          <div class="ratio ratio-16x9">
            <video id="trailerVideo" class="w-100 h-100" controls playsinline>
              <source id="trailerSource" src="" type="video/mp4"/>
              <h4>"Your browser does not support the video tag!"</h4>
            </video>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center py-3">
    <div class="container"><small class="text-muted">© 2026 MvcMovie</small></div>
  </footer>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App JS -->
  <script src="/js/cinema.js"></script>
</body>
</html>
