trigger:
  - main

variables:
  imageTag: '$(Build.BuildId)'
  dockerRepository: '$(docker-image-name)'
  dockerServiceConnection: 'dockerhub-conn'
  sshServiceConnection: 'aws-ssh-conn'
  containerPort: '8080'
  hostPort: '80'

  # SonarCloud variables (set these in pipeline or variable group)
  SONAR_PROJECT_KEY: '$(proj-key)'             # replace with your SonarCloud project key
  SONAR_PROJECT_NAME: '$(proj-name)'           # replace with your SonarCloud project name
  SONAR_ORGANIZATION: '$(org-name)'            # replace with your SonarCloud organization key
  SONAR_SERVICE_CONNECTION: 'sonarcloud-conn'  # SonarCloud service connection name

  # Azure Artifacts Maven feed
  MAVEN_FEED: '$(mvc-movies-feed)'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build with Maven
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:
    - checkout: self
      fetchDepth: 0

    - task: SonarCloudPrepare@3
      displayName: Prepare SonarCloud analysis
      inputs:
        SonarCloud: '$(SONAR_SERVICE_CONNECTION)'
        organization: '$(SONAR_ORGANIZATION)'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: '$(SONAR_PROJECT_KEY)'
        cliProjectName: '$(SONAR_PROJECT_NAME)'
        cliSources: 'src' # Pointing to src is usually sufficient
        extraProperties: |
          sonar.java.binaries=target/classes
          sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

    - script: |
        echo "Running unit tests and generating coverage (maven verify)"
        if [ -f mvnw ]; then
          chmod +x mvnw || true
          ./mvnw -B clean verify
        else
          mvn -B clean verify
        fi
      displayName: Run tests and generate coverage
    
    - script: |
        echo "Listing all files in target folder:"
        find target -name jacoco.xml
      displayName: 'Debug: Locate JaCoCo file'

    - task: PublishCodeCoverageResults@1
      displayName: Publish code coverage
      inputs:
        codeCoverageTool: 'JaCoCo'
        # The '**' tells Azure to search all subdirectories for the file
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/jacoco.xml'
        reportDirectory: '$(System.DefaultWorkingDirectory)/**/site/jacoco'

    - script: |
        echo "Packaging artifact (maven package)"
        if [ -f mvnw ]; then
          chmod +x mvnw || true
          ./mvnw -B package
        else
          mvn -B clean package
        fi
      displayName: Build with Maven

    - task: SonarCloudAnalyze@3
      displayName: Run SonarCloud analysis

    - task: SonarCloudPublish@3
      displayName: Publish SonarCloud Quality Gate Result
      inputs:
        pollingTimeoutSec: '300'

    - task: PublishBuildArtifacts@1
      displayName: Publish JAR artifact
      inputs:
        PathtoPublish: 'target'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deliver
  displayName: Deliver (release artifact to Azure Artifacts Maven feed)
  dependsOn: Build
  jobs:
  - job: DeliverJob
    displayName: Deliver Job
    steps:
    - checkout: self
      fetchDepth: 0

    - task: MavenAuthenticate@0
      displayName: Authenticate to Azure Artifacts Maven feed
      inputs:
        artifactsFeeds: '$(MAVEN_FEED)'

    - script: |
        echo "Deploying artifact to Maven feed: $(MAVEN_FEED)"
        if [ -f mvnw ]; then
          chmod +x mvnw || true
          ./mvnw -B deploy -DskipTests
        else
          mvn -B deploy -DskipTests -Dmaven.resolver.transport=wagon
        fi
      displayName: Maven deploy to feed

- stage: DockerBuildAndPush
  displayName: Build and Push Docker Image
  dependsOn: Deliver
  jobs:
  - job: DockerJob
    displayName: Docker Build and Push
    steps:
    - task: Docker@2
      displayName: Docker login (service connection)
      inputs:
        command: login
        containerRegistry: '$(dockerServiceConnection)'

    - task: Docker@2
      displayName: Build and push image
      inputs:
        command: buildAndPush
        containerRegistry: '$(dockerServiceConnection)'
        repository: '$(dockerRepository)'
        Dockerfile: '**/Dockerfile'
        buildContext: '.'
        tags: $(imageTag),latest

    - script: |
        echo "Image pushed: $(dockerRepository):$(imageTag)"
      displayName: Info

- stage: DeployToDev
  displayName: Deploy to Dev
  dependsOn: DockerBuildAndPush
  jobs:
  - deployment: DeployDev
    displayName: Deploy to Dev
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: SSH@0
            displayName: SSH Deploy to Dev (pull & run)
            inputs:
              sshEndpoint: '$(sshServiceConnection)'
              runOptions: 'commands'
              commands: |
                set -e
                echo "Deploying to Dev environment"
                docker ps -q --filter "name=app_dev" | grep -q . && docker stop app_dev || true
                docker ps -a -q --filter "name=app_dev" | grep -q . && docker rm app_dev || true
                docker pull $(dockerRepository):$(imageTag)
                docker run -d --name app_dev -p 8081:$(containerPort) --restart unless-stopped $(dockerRepository):$(imageTag)
                docker ps -a

- stage: DeployToQAT
  displayName: Deploy to QAT
  dependsOn: DeployToDev
  jobs:
  - deployment: DeployQAT
    displayName: Deploy to QAT
    environment: 'qat'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: SSH@0
            displayName: SSH Deploy to QAT (pull & run)
            inputs:
              sshEndpoint: '$(sshServiceConnection)'
              runOptions: 'commands'
              commands: |
                set -e
                echo "Deploying to QAT environment"
                docker ps -q --filter "name=app_qat" | grep -q . && docker stop app_qat || true
                docker ps -a -q --filter "name=app_qat" | grep -q . && docker rm app_qat || true
                docker pull $(dockerRepository):$(imageTag)
                docker run -d --name app_qat -p 8082:$(containerPort) --restart unless-stopped $(dockerRepository):$(imageTag)
                docker ps -a

- stage: DeployToStaging
  displayName: Deploy to Staging
  dependsOn: DeployToQAT
  jobs:
  - deployment: DeployStaging
    displayName: Deploy to Staging
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: SSH@0
            displayName: SSH Deploy to Staging (pull & run)
            inputs:
              sshEndpoint: '$(sshServiceConnection)'
              runOptions: 'commands'
              commands: |
                set -e
                echo "Deploying to Staging environment"
                docker ps -q --filter "name=app_staging" | grep -q . && docker stop app_staging || true
                docker ps -a -q --filter "name=app_staging" | grep -q . && docker rm app_staging || true
                docker pull $(dockerRepository):$(imageTag)
                docker run -d --name app_staging -p 8083:$(containerPort) --restart unless-stopped $(dockerRepository):$(imageTag)
                docker ps -a

- stage: DeployToProd
  displayName: Deploy to Production
  dependsOn: DeployToStaging
  jobs:
  - deployment: DeployProd
    displayName: Deploy to Production
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: SSH@0
            displayName: SSH Pull and Run Container on EC2 (Production)
            inputs:
              sshEndpoint: '$(sshServiceConnection)'
              runOptions: 'commands'
              commands: |
                set -e
                echo "--- DEBUG INFO ---"
                echo "User: $USER"
                echo "Directory: $PWD"

                echo "Stopping existing container if present..."
                docker ps -q --filter "name=lab4_app" | grep -q . && docker stop lab4_app || true
                docker ps -a -q --filter "name=lab4_app" | grep -q . && docker rm lab4_app || true

                echo "Pulling image: $(dockerRepository):$(imageTag)"
                docker pull $(dockerRepository):$(imageTag)

                echo "Launching container on port $(hostPort)..."
                docker run -d --name lab4_app -p $(hostPort):$(containerPort) --restart unless-stopped $(dockerRepository):$(imageTag)

                echo "Deployment complete. Current status:"
                docker ps -a
