trigger:
  - main

variables:
  imageTag: '$(Build.BuildId)'
  dockerRepository: '$(docker-image-name)'
  dockerServiceConnection: 'dockerhub-conn'
  sshServiceConnection: 'aws-ssh-conn'
  containerPort: '8080'
  hostPort: '80'

  # SonarCloud variables (set these in pipeline or variable group)
  SONAR_PROJECT_KEY: '$(proj-key)'             # replace with your SonarCloud project key
  SONAR_PROJECT_NAME: '$(proj-name)'             # replace with your SonarCloud project name
  SONAR_ORGANIZATION: '$(org-name)'             # replace with your SonarCloud organization key
  SONAR_SERVICE_CONNECTION: 'sonarcloud-conn' # SonarCloud service connection name

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build with Maven
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:
    - checkout: self
      fetchDepth: 0

    - task: SonarCloudPrepare@3
      displayName: Prepare SonarCloud analysis
      inputs:
        SonarCloud: '$(SONAR_SERVICE_CONNECTION)'
        organization: '$(SONAR_ORGANIZATION)'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: '$(SONAR_PROJECT_KEY)'
        cliProjectName: '$(SONAR_PROJECT_NAME)'
        cliSources: '.'
        extraProperties: |
          sonar.java.binaries=target
          sonar.sources=src

    - script: |
        echo "Building with mvn or mvnw"
        if [ -f mvnw ]; then
          chmod +x mvnw || true
          ./mvnw -B -DskipTests package
        else
          mvn -B clean package -DskipTests
        fi
      displayName: Build with Maven

    - task: SonarCloudAnalyze@3
      displayName: Run SonarCloud analysis

    - task: SonarCloudPublish@3
      displayName: Publish SonarCloud Quality Gate Result
      inputs:
        pollingTimeoutSec: '300'

    - task: PublishBuildArtifacts@1
      displayName: Publish JAR artifact
      inputs:
        PathtoPublish: 'target'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: DockerBuildAndPush
  displayName: Build and Push Docker Image
  dependsOn: Build
  jobs:
  - job: DockerJob
    displayName: Docker Build and Push
    steps:
    - task: Docker@2
      displayName: Docker login (service connection)
      inputs:
        command: login
        containerRegistry: '$(dockerServiceConnection)'

    - task: Docker@2
      displayName: Build and push image
      inputs:
        command: buildAndPush
        containerRegistry: '$(dockerServiceConnection)'
        repository: '$(dockerRepository)'
        Dockerfile: '**/Dockerfile'
        buildContext: '.'
        tags: $(imageTag),latest

    - script: |
        echo "Image pushed: $(dockerRepository):$(imageTag)"
      displayName: Info

- stage: Deploy
  displayName: Deploy to EC2 via SSH
  dependsOn: DockerBuildAndPush
  jobs:
  - deployment: DeployToEC2
    displayName: Deploy to EC2
    environment: 'aws-ec2'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: SSH@0
            displayName: SSH Pull and Run Container on EC2
            inputs:
              sshEndpoint: '$(sshServiceConnection)'
              runOptions: 'commands'
              commands: |
                set -e
                echo "--- DEBUG INFO ---"
                echo "User: $USER"
                echo "Directory: $PWD"

                echo "Stopping existing container if present..."
                docker ps -q --filter "name=lab4_app" | grep -q . && docker stop lab4_app || true
                docker ps -a -q --filter "name=lab4_app" | grep -q . && docker rm lab4_app || true

                echo "Pulling image: $(dockerRepository):$(imageTag)"
                docker pull $(dockerRepository):$(imageTag)

                echo "Launching container on port $(hostPort)..."
                docker run -d --name lab4_app -p $(hostPort):$(containerPort) --restart unless-stopped $(dockerRepository):$(imageTag)

                echo "Deployment complete. Current status:"
                docker ps -a
